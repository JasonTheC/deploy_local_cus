services:
  # ── TCP image ingestion + 3D reconstruction (GPU) ──────────────
  backend:
    build: .
    container_name: cus-backend
    ports:
      - "8890:8890"
      - "7556:7556"
    environment:
      - PYTHONUNBUFFERED=1
      - MAX_CONCURRENT_JOBS=${MAX_CONCURRENT_JOBS:-2}
      - MAX_QUEUE_SIZE=${MAX_QUEUE_SIZE:-16}
      - PACS_TCP_PORT=8890
      - PACS_WS_PORT=7556
      # ── Primary PACS (the local Orthanc container) ──────────
      - PACS_HOST=orthanc
      - PACS_PORT=4242
      - PACS_AET=ORTHANC
      # ── Fallback PACS nodes (for redundancy / 28yr retention) ─
      # Every study is C-STORE'd to ALL nodes below. A study is only
      # marked "sent" once every node confirms storage, so a node that
      # is briefly offline gets retried automatically by the janitor.
      # To add a site, uncomment a block and fill in its IP / port / AE
      # title. PACS2_PORT/AET default to 104 / ORTHANC if omitted.
      - PACS2_HOST=${PACS2_HOST:-}
      - PACS2_PORT=${PACS2_PORT:-104}
      - PACS2_AET=${PACS2_AET:-ORTHANC}
      - PACS3_HOST=${PACS3_HOST:-}
      - PACS3_PORT=${PACS3_PORT:-104}
      - PACS3_AET=${PACS3_AET:-ORTHANC}
    volumes:
      - ./US_images:/app/US_images
      - ./outputs:/app/outputs
      - ./CUS.db:/app/CUS.db
    restart: unless-stopped
    networks:
      - cus-net

  # ── Orthanc PACS (DICOM storage + WADO/DICOMweb) ───────────────
  orthanc:
    image: jodogne/orthanc-plugins:latest
    container_name: cus-orthanc
    ports:
      - "4242:4242"
      - "8042:8042"
    volumes:
      - ./orthanc.json:/etc/orthanc/orthanc.json:ro
      - orthanc-db:/var/lib/orthanc/db-v6
    restart: unless-stopped
    networks:
      - cus-net

  # ── OHIF Viewer (DICOM web viewer backed by Orthanc) ───────────
  ohif:
    image: ohif/viewer:latest
    container_name: cus-ohif
    ports:
      - "3000:80"
    volumes:
      - ./app-config.js:/usr/share/nginx/html/app-config.js:ro
    depends_on:
      - orthanc
    restart: unless-stopped
    networks:
      - cus-net

  # ── NIfTI 3D volume browser (serves outputs/ with web viewer) ──
  nifti-viewer:
    image: nginx:alpine
    container_name: cus-nifti-viewer
    ports:
      - "3001:80"
    volumes:
      - ./outputs:/usr/share/nginx/html/volumes:ro
      - ./nifti-viewer/index.html:/usr/share/nginx/html/index.html:ro
      - ./nifti-viewer/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - cus-net

volumes:
  orthanc-db:

networks:
  cus-net:
    driver: bridge
