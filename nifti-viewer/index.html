<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUS — NIfTI Volume Viewer</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1117;color:#c9d1d9;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  header{background:#161b22;padding:10px 20px;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:14px;flex-shrink:0;z-index:5}
  header h1{font-size:16px;font-weight:600;color:#58a6ff}
  header span{font-size:12px;color:#8b949e}
  .refresh-btn{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;margin-left:auto}
  .refresh-btn:hover{background:#30363d}
  .main{display:flex;flex:1;overflow:hidden}
  .sidebar{width:260px;background:#161b22;border-right:1px solid #30363d;display:flex;flex-direction:column;flex-shrink:0}
  .sidebar h2{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:#8b949e;padding:10px 12px 6px}
  .file-list{flex:1;overflow-y:auto;padding:4px 8px 8px}
  .file-item{padding:7px 10px;cursor:pointer;border-radius:5px;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .12s}
  .file-item:hover{background:#21262d}
  .file-item.active{background:#1f6feb33;color:#58a6ff;border-left:3px solid #58a6ff}
  .viewer-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .toolbar{background:#161b22;padding:6px 12px;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .toolbar label{font-size:12px;color:#8b949e;display:flex;align-items:center;gap:6px}
  .toolbar select{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:3px 6px;border-radius:4px;font-size:12px;cursor:pointer}
  .toolbar .hint{margin-left:auto;font-size:11px;color:#8b949e}
  .canvas-wrap{flex:1;position:relative;background:#010409;overflow:hidden}
  .canvas-wrap canvas{position:absolute;inset:0;width:100%;height:100%}
  .placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#484f58;font-size:14px;text-align:center;padding:20px;z-index:2;background:#010409}
  .status{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:#161b22ee;padding:6px 14px;border-radius:6px;font-size:12px;color:#58a6ff;z-index:10;display:none}
  .status.error{color:#f85149}
</style>
<!-- Niivue WebGL NIfTI viewer — served locally, no CDN dependency -->
<script src="niivue.umd.js"></script>
</head>
<body>

<header>
  <h1>CUS NIfTI Viewer</h1>
  <span>WebGL volume viewer · Niivue</span>
  <button class="refresh-btn" id="refreshBtn">↻ Refresh</button>
</header>

<div class="main">
  <div class="sidebar">
    <h2>Volumes</h2>
    <div class="file-list" id="file-list"><div style="padding:12px;color:#484f58;font-size:12px;">Loading…</div></div>
  </div>
  <div class="viewer-area">
    <div class="toolbar" id="toolbar">
      <label>View:
        <select id="sliceTypeSelect">
          <option value="multi" selected>Multiplanar + 3D</option>
          <option value="axial">Axial</option>
          <option value="coronal">Coronal</option>
          <option value="sagittal">Sagittal</option>
          <option value="render">3D Render</option>
        </select>
      </label>
      <label>Colormap:
        <select id="colormapSelect">
          <option value="gray" selected>Gray</option>
          <option value="viridis">Viridis</option>
          <option value="inferno">Inferno</option>
          <option value="hot">Hot</option>
          <option value="bone">Bone</option>
        </select>
      </label>
      <span class="hint">scroll = slice · left-drag = crosshair · right-drag = window/level</span>
    </div>
    <div class="canvas-wrap">
      <div class="placeholder" id="placeholder">Select a volume from the sidebar to view</div>
      <div class="status" id="status"></div>
      <canvas id="gl"></canvas>
    </div>
  </div>
</div>

<script>
const fileListEl = document.getElementById('file-list');
const placeholderEl = document.getElementById('placeholder');
const statusEl = document.getElementById('status');
const sliceTypeSelect = document.getElementById('sliceTypeSelect');
const colormapSelect = document.getElementById('colormapSelect');

const nv = new niivue.Niivue({
  backColor: [0.004, 0.016, 0.035, 1],
  show3Dcrosshair: true,
  crosshairColor: [0.345, 0.651, 1, 1],
  dragAndDropEnabled: false,
});
nv.attachToCanvas(document.getElementById('gl'));

function showStatus(msg, isError) {
  if (!msg) { statusEl.style.display = 'none'; return; }
  statusEl.textContent = msg;
  statusEl.className = 'status' + (isError ? ' error' : '');
  statusEl.style.display = 'block';
}

// ── File listing (nginx autoindex of /volumes/) ─────────────
async function loadFiles() {
  fileListEl.innerHTML = '<div style="padding:12px;color:#484f58;font-size:12px;">Loading volumes…</div>';
  try {
    const resp = await fetch('/volumes/?C=N&O=D', { headers: { Accept: 'text/html' } });
    const html = await resp.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const files = [];
    doc.querySelectorAll('a[href]').forEach(a => {
      const href = a.getAttribute('href');
      if (href.endsWith('.nii') || href.endsWith('.nii.gz')) {
        let url = href.startsWith('/') ? href : '/volumes/' + href;
        url = url.split('?')[0];
        // Derive name from the href, not the anchor text — nginx autoindex
        // truncates long names in the text, and Niivue detects the image
        // format from the name's extension.
        const name = decodeURIComponent(url.split('/').pop());
        files.push({ name, url });
      }
    });
    renderFiles(files);
  } catch (err) {
    fileListEl.innerHTML = '<div style="padding:12px;color:#f85149;font-size:12px;">Failed to load list. Place .nii files in outputs/ and refresh.</div>';
  }
}

function renderFiles(files) {
  if (!files.length) {
    fileListEl.innerHTML = '<div style="padding:12px;color:#484f58;font-size:12px;">No .nii volumes found.<br><br>Place .nii files in <code>outputs/</code>.</div>';
    return;
  }
  fileListEl.innerHTML = '';
  files.forEach(f => {
    const div = document.createElement('div');
    div.className = 'file-item';
    div.textContent = f.name;
    div.title = f.name;
    div.addEventListener('click', () => selectVolume(f, div));
    fileListEl.appendChild(div);
  });
}

// ── Volume loading ──────────────────────────────────────────
async function selectVolume(file, el) {
  document.querySelectorAll('.file-item').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  showStatus(`Loading ${file.name}…`, false);
  try {
    await nv.loadVolumes([{ url: file.url, name: file.name, colormap: colormapSelect.value }]);
    placeholderEl.style.display = 'none';
    applySliceType();
    showStatus(null);
  } catch (err) {
    console.error('Load error:', err);
    showStatus(`Error: ${err.message}`, true);
  }
}

function applySliceType() {
  const v = sliceTypeSelect.value;
  if (v === 'multi') {
    nv.opts.multiplanarShowRender = niivue.SHOW_RENDER.ALWAYS;
    nv.setSliceType(nv.sliceTypeMultiplanar);
  } else if (v === 'axial') {
    nv.setSliceType(nv.sliceTypeAxial);
  } else if (v === 'coronal') {
    nv.setSliceType(nv.sliceTypeCoronal);
  } else if (v === 'sagittal') {
    nv.setSliceType(nv.sliceTypeSagittal);
  } else {
    nv.setSliceType(nv.sliceTypeRender);
  }
}

sliceTypeSelect.addEventListener('change', applySliceType);
colormapSelect.addEventListener('change', () => {
  if (nv.volumes.length) {
    nv.setColormap(nv.volumes[0].id, colormapSelect.value);
  }
});
document.getElementById('refreshBtn').addEventListener('click', loadFiles);

loadFiles();
</script>
</body>
</html>
